# ══════════════════════════════════════════════════════════════
#  SoukLink — Pipeline CI/CD GitHub Actions
#  Auteur : Abdessamad Ouchaib
#
#  Se déclenche : push ou pull_request sur la branche main
#  Étapes :
#    1. Tests backend Java (JUnit 5 + Mockito) avec profil H2
#    2. Build frontend Angular (compilation + vérification)
# ══════════════════════════════════════════════════════════════

name: SoukLink CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1 : Tests backend Spring Boot ───────────────────────
  backend-tests:
    name: Tests Backend (JUnit 5)
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Exécuter les tests (profil H2 en mémoire)
        working-directory: ./backend
        run: mvn test -Dspring.profiles.active=test
        env:
          # Variables fictives pour les tests — la vraie DB n'est pas utilisée
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
          JWT_SECRET: CleSecreteDeTestPourGitHubActionsCI2026
          STRIPE_SECRET_KEY: sk_test_fake_ci
          STRIPE_WEBHOOK_SECRET: whsec_fake_ci
          APP_FRONTEND_URL: http://localhost:4200
          CORS_ALLOWED_ORIGINS: http://localhost:4200

      - name: Publier le rapport de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rapport-tests-backend
          path: backend/target/surefire-reports/

  # ── Job 2 : Build frontend Angular ──────────────────────────
  frontend-build:
    name: Build Frontend (Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        working-directory: ./frontend
        run: npm ci

      - name: Build production
        working-directory: ./frontend
        run: npm run build -- --configuration=production

      - name: Publier les artifacts de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/souklink/
