# ═══════════════════════════════════════════════════════════════
#  SoukLink — configuration pour les tests (profil "test")
#  Base de données H2 en mémoire — aucune dépendance à Supabase
# ═══════════════════════════════════════════════════════════════

spring.datasource.url=jdbc:h2:mem:souklink_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

jwt.secret=SoukLinkTestSecretKeyPourLesTestsUniquement2026
jwt.expiration=3600000

cors.allowed-origins=http://localhost:4200
app.frontend-url=http://localhost:4200

stripe.secret-key=sk_test_fake_for_tests
stripe.webhook-secret=whsec_fake_for_tests

logging.level.com.souklink=WARN
logging.level.org.springframework.security=WARN
