# ═══════════════════════════════════════════════════════════════
#  SoukLink — application.properties
#  Les valeurs sont lues depuis les variables d'environnement
#  (définies sur Render) avec ${VAR:valeur_par_defaut}
# ═══════════════════════════════════════════════════════════════

spring.application.name=souklink-backend

# ── Serveur ────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Base de données PostgreSQL (Supabase) ──────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/souklink}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Connection pool (important pour Supabase pooler) ──────────
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5

# ── JPA / Hibernate ────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:SoukLinkSecretKey2026AbdessamadPortfolio!!}
jwt.expiration=86400000

# ── CORS ───────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ── Frontend (utilisé pour les redirections Stripe Checkout) ───
app.frontend-url=${APP_FRONTEND_URL:http://localhost:4200}

# ── Stripe (mode test) ──────────────────────────────────────────
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

# ── Multipart / Upload ──────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── Logs ───────────────────────────────────────────────────────
logging.level.com.souklink=INFO
logging.level.org.springframework.security=WARN

spring.security.user.name=disabled
spring.security.user.password=disabled
